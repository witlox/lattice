name: CI — lattice-client

on:
  push:
    branches: [main]
    paths:
      - "crates/lattice-client/**"
      - "crates/lattice-common/**"
      - "proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "crates/lattice-client/**"
      - "crates/lattice-common/**"
      - "proto/**"
      - "Cargo.toml"
      - "Cargo.lock"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -p lattice-client -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
      - run: cargo clippy -p lattice-client --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run -p lattice-client --no-tests=pass

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3

      - name: Set release version
        run: ./scripts/set-version.sh

      - name: Vendor proto files into lattice-common for publish
        run: |
          mkdir -p crates/lattice-common/proto
          cp -r proto/lattice crates/lattice-common/proto/

      - name: Check if lattice-common already published
        id: check_common
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "lattice-common") | .version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if cargo search lattice-common --limit 1 | grep -q "lattice-common = \"$VERSION\""; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "lattice-common $VERSION already published"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "lattice-common $VERSION not yet published"
          fi

      - name: Publish lattice-common
        if: steps.check_common.outputs.skip == 'false'
        run: cargo publish -p lattice-common --allow-dirty --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for crates.io index update
        if: steps.check_common.outputs.skip == 'false'
        run: sleep 30

      - name: Check if lattice-client already published
        id: check_client
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "lattice-client") | .version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if cargo search lattice-client --limit 1 | grep -q "lattice-client = \"$VERSION\""; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "lattice-client $VERSION already published"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "lattice-client $VERSION not yet published"
          fi

      - name: Publish lattice-client
        if: steps.check_client.outputs.skip == 'false'
        run: cargo publish -p lattice-client --allow-dirty --token ${{ secrets.CRATES_IO_TOKEN }}
