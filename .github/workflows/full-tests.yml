name: Full Test Suite

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  unit-tests:
    name: All Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: arduino/setup-protoc@v3
      - name: Run tests (nextest, including slow)
        run: cargo nextest run --workspace --all-features --profile ci --no-tests=pass --run-ignored all --exclude lattice-acceptance --exclude lattice-test-harness

  acceptance-tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
      - name: Run acceptance tests (cucumber, custom harness)
        run: cargo test -p lattice-acceptance --all-features

  e2e-tests:
    name: E2E Tests (testcontainers)
    runs-on: ubuntu-latest
    needs: [unit-tests, acceptance-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install -r tests/e2e/requirements.txt
      - name: Install Lattice SDK
        run: pip install -e sdk/python
      - name: Run e2e tests
        run: pytest tests/e2e/ -v --timeout=300
        timeout-minutes: 10
