name: Full Test Suite

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  test-all:
    name: All Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: arduino/setup-protoc@v3
      - name: Run tests (nextest, including slow)
        run: cargo nextest run --workspace --all-features --profile ci --no-tests=pass --run-ignored all --exclude lattice-acceptance
      - name: Run acceptance tests (cucumber, custom harness)
        run: cargo test -p lattice-acceptance --all-features
