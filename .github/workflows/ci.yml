name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - "infra/**"
      - "examples/**"
      - "config/**"
      - "book.toml"
      - ".github/workflows/docs.yml"
      - "LICENSE"
      - "logo.png"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - "infra/**"
      - "examples/**"
      - "config/**"
      - "book.toml"
      - ".github/workflows/docs.yml"
      - "LICENSE"
      - "logo.png"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: arduino/setup-protoc@v3
      - name: Run tests (nextest)
        run: cargo nextest run --workspace --all-features --no-tests=pass --exclude lattice-acceptance --exclude lattice-test-harness

  acceptance-tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
      - name: Run acceptance tests (cucumber, custom harness)
        run: cargo test -p lattice-acceptance --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, acceptance-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - uses: arduino/setup-protoc@v3
      - name: Collect coverage (unit & integration tests)
        run: cargo llvm-cov --no-report nextest --workspace --all-features --no-tests=pass --exclude lattice-acceptance --exclude lattice-test-harness
      - name: Collect coverage (acceptance tests)
        run: cargo llvm-cov --no-report -p lattice-acceptance --all-features -- --test-threads=1
      - name: Generate coverage report
        run: cargo llvm-cov report --lcov --output-path lcov.info --ignore-filename-regex '(lattice-acceptance|lattice-test-harness)'
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
