name: Release

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publishing)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Preflight: version check, fmt, clippy, test, deny ──────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3

      - name: Compute version
        id: version
        run: |
          VERSION=$(./scripts/set-version.sh --dry-run)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        if: steps.check_tag.outputs.exists == 'false'
        run: ./scripts/set-version.sh

      - name: Check formatting
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo test --workspace

      - uses: EmbarkStudios/cargo-deny-action@v2
        if: steps.check_tag.outputs.exists == 'false'

  # ── Build: arch-only binaries (server, CLI, rm-replay) ─────────
  build-common:
    name: Build common (${{ matrix.arch }})
    needs: preflight
    if: needs.preflight.outputs.skip == 'false'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}-common
      - uses: arduino/setup-protoc@v3

      - name: Set version
        run: ./scripts/set-version.sh

      - name: Build server, CLI, rm-replay
        run: |
          cargo build --release -p lattice-api -p lattice-cli
          cargo build --release --manifest-path tools/rm-replay/Cargo.toml

      - name: Package
        run: |
          mkdir -p dist
          for bin in lattice-server lattice rm-replay; do
            if [ -f "target/release/$bin" ]; then
              cp "target/release/$bin" dist/
              tar czf "dist/${bin}-${{ matrix.arch }}.tar.gz" -C dist "$bin"
              rm "dist/$bin"
            fi
          done

      - uses: actions/upload-artifact@v7
        with:
          name: common-${{ matrix.arch }}
          path: dist/*.tar.gz

  # ── Build: node agent variants (arch × GPU) ────────────────────
  #
  # Artifacts:
  #   lattice-agent-x86_64-cpu.tar.gz     — CPU-only nodes
  #   lattice-agent-x86_64-nvidia.tar.gz  — NVIDIA H100/A100/etc
  #   lattice-agent-x86_64-rocm.tar.gz    — AMD MI300X/MI250/etc
  #   lattice-agent-arm64-cpu.tar.gz      — CPU-only ARM nodes
  #   lattice-agent-arm64-nvidia.tar.gz   — NVIDIA GH200 superchip
  #
  build-agent:
    name: Build agent (${{ matrix.arch }}-${{ matrix.gpu }})
    needs: preflight
    if: needs.preflight.outputs.skip == 'false'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 — CPU only (no GPU discovery)
          - arch: x86_64
            runner: ubuntu-latest
            gpu: cpu
            features: ""
          # x86_64 — NVIDIA (H100, A100, etc.)
          - arch: x86_64
            runner: ubuntu-latest
            gpu: nvidia
            features: "--features nvidia"
          # x86_64 — AMD ROCm (MI300X, MI250, etc.)
          - arch: x86_64
            runner: ubuntu-latest
            gpu: rocm
            features: "--features rocm"
          # arm64 — CPU only
          - arch: arm64
            runner: ubuntu-24.04-arm
            gpu: cpu
            features: ""
          # arm64 — NVIDIA (GH200 Grace Hopper superchip)
          - arch: arm64
            runner: ubuntu-24.04-arm
            gpu: nvidia
            features: "--features nvidia"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}-${{ matrix.gpu }}
      - uses: arduino/setup-protoc@v3

      - name: Set version
        run: ./scripts/set-version.sh

      - name: Build node agent
        run: cargo build --release -p lattice-node-agent ${{ matrix.features }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/lattice-agent dist/
          tar czf "dist/lattice-agent-${{ matrix.arch }}-${{ matrix.gpu }}.tar.gz" -C dist lattice-agent
          rm dist/lattice-agent

      - uses: actions/upload-artifact@v7
        with:
          name: agent-${{ matrix.arch }}-${{ matrix.gpu }}
          path: dist/*.tar.gz

  # ── Publish: collect artifacts and create GitHub release ────────
  publish:
    name: Publish Release
    needs: [preflight, build-common, build-agent]
    if: needs.preflight.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh dist/

      - name: Create release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${{ needs.preflight.outputs.version }}"

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" dist/*.tar.gz \
            --title "Lattice $VERSION" \
            --generate-notes

  # ── Publish hpc-scheduler-core to crates.io ──────────────────
  publish-crate:
    name: Publish hpc-scheduler-core
    needs: [preflight, publish]
    if: needs.preflight.outputs.skip == 'false' && !inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Set version
        run: ./scripts/set-version.sh

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p hpc-scheduler-core --no-verify --allow-dirty
