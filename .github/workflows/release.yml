name: Release

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publishing)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Preflight: version check, fmt, clippy, test, deny ──────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3

      - name: Compute version
        id: version
        run: |
          VERSION=$(./scripts/set-version.sh --dry-run)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        if: steps.check_tag.outputs.exists == 'false'
        run: ./scripts/set-version.sh

      - name: Check formatting
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo test --workspace

      - uses: EmbarkStudios/cargo-deny-action@v2
        if: steps.check_tag.outputs.exists == 'false'

  # ── Build matrix: arch × GPU variant ───────────────────────────
  build:
    name: Build (${{ matrix.arch }}, ${{ matrix.gpu }})
    needs: preflight
    if: needs.preflight.outputs.skip == 'false'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 — default (AMD GPU via rocm-smi)
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            gpu: default
            agent_features: ""
          # x86_64 — NVIDIA GPU (nvml-wrapper)
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            gpu: nvidia
            agent_features: "--features nvidia"
          # aarch64 — default (AMD GPU via rocm-smi)
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            gpu: default
            agent_features: ""
          # aarch64 — NVIDIA GPU (nvml-wrapper, GH200 superchip)
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            gpu: nvidia
            agent_features: "--features nvidia"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.gpu }}
      - uses: arduino/setup-protoc@v3

      - name: Set version
        run: ./scripts/set-version.sh

      # Build server, CLI, and rm-replay (no GPU features needed)
      # Only build once per arch (skip for nvidia variant)
      - name: Build server, CLI, rm-replay
        if: matrix.gpu == 'default'
        run: |
          cargo build --release -p lattice-api -p lattice-cli
          cargo build --release --manifest-path tools/rm-replay/Cargo.toml

      # Build node agent with GPU-specific features
      - name: Build node agent (${{ matrix.gpu }})
        run: cargo build --release -p lattice-node-agent ${{ matrix.agent_features }}

      - name: Package binaries
        run: |
          mkdir -p dist
          SUFFIX="${{ matrix.arch }}"

          # Agent is always built (with GPU variant suffix)
          cp target/release/lattice-agent dist/
          tar czf "dist/lattice-agent-${SUFFIX}-${{ matrix.gpu }}.tar.gz" -C dist lattice-agent
          rm dist/lattice-agent

          # Server, CLI, rm-replay only in default variant
          if [ "${{ matrix.gpu }}" = "default" ]; then
            for bin in lattice-server lattice rm-replay; do
              if [ -f "target/release/$bin" ]; then
                cp "target/release/$bin" dist/
                tar czf "dist/${bin}-${SUFFIX}.tar.gz" -C dist "$bin"
                rm "dist/$bin"
              fi
            done
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.arch }}-${{ matrix.gpu }}
          path: dist/*.tar.gz

  # ── Publish: collect artifacts and create GitHub release ────────
  publish:
    name: Publish Release
    needs: [preflight, build]
    if: needs.preflight.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh dist/

      - name: Create release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${{ needs.preflight.outputs.version }}"

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" dist/*.tar.gz \
            --title "Lattice $VERSION" \
            --generate-notes
