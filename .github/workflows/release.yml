name: Release

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publishing)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Preflight: version check, fmt, clippy, test, deny ──────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3

      - name: Compute version
        id: version
        run: |
          VERSION=$(./scripts/set-version.sh --dry-run)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        if: steps.check_tag.outputs.exists == 'false'
        run: ./scripts/set-version.sh

      - name: Check formatting
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        if: steps.check_tag.outputs.exists == 'false'
        run: cargo test --workspace

      - uses: EmbarkStudios/cargo-deny-action@v2
        if: steps.check_tag.outputs.exists == 'false'

  # ── Build: all binaries per architecture ───────────────────────
  #
  # Single job per arch builds everything with all features enabled.
  # GPU libraries (NVML, ROCm) are loaded at runtime — no build-time deps.
  # eBPF (aya) compiles to stubs on non-Linux; loads programs at runtime.
  #
  # Artifacts per arch:
  #   lattice-server-{arch}.tar.gz
  #   lattice-{arch}.tar.gz          (CLI)
  #   rm-replay-{arch}.tar.gz
  #   lattice-agent-{arch}.tar.gz    (all GPU support baked in)
  #
  build:
    name: Build (${{ matrix.arch }})
    needs: preflight
    if: needs.preflight.outputs.skip == 'false'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}
      - uses: arduino/setup-protoc@v3

      - name: Set version
        run: ./scripts/set-version.sh

      - name: Build all binaries
        run: |
          cargo build --release --all-features -p lattice-api -p lattice-cli -p lattice-node-agent
          cargo build --release --manifest-path tools/rm-replay/Cargo.toml

      - name: Package
        run: |
          mkdir -p dist
          for bin in lattice-server lattice rm-replay lattice-agent; do
            if [ -f "target/release/$bin" ]; then
              cp "target/release/$bin" dist/
              tar czf "dist/${bin}-${{ matrix.arch }}.tar.gz" -C dist "$bin"
              rm "dist/$bin"
            fi
          done

      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.arch }}
          path: dist/*.tar.gz

  # ── Publish: collect artifacts and create GitHub release ────────
  publish:
    name: Publish Release
    needs: [preflight, build]
    if: needs.preflight.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh dist/

      - name: Create release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${{ needs.preflight.outputs.version }}"

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" dist/*.tar.gz \
            --title "Lattice $VERSION" \
            --generate-notes
