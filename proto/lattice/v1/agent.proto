syntax = "proto3";

package lattice.v1;

option go_package = "github.com/lattice-scheduler/lattice/gen/go/lattice/v1";

import "google/protobuf/timestamp.proto";
import "lattice/v1/allocations.proto";
import "lattice/v1/mpi.proto";

// ─── Node Agent Service ─────────────────────────────────────
//
// Internal service running on each compute node. The control plane
// (API server / quorum) calls these RPCs to manage allocations,
// forward attach sessions, and stream logs from the node agent.

service NodeAgentService {
  // Start an allocation on this node (prologue + run).
  rpc RunAllocation(RunAllocationRequest) returns (RunAllocationResponse);

  // Stop a running allocation on this node.
  rpc StopAllocation(StopAllocationRequest) returns (StopAllocationResponse);

  // Attach an interactive terminal to a running allocation (bidirectional streaming).
  // The first message MUST be an AttachInput with the `start` field set.
  rpc Attach(stream AttachInput) returns (stream AttachOutput);

  // Stream logs from a running allocation on this node (server streaming).
  rpc StreamLogs(LogStreamRequest) returns (stream LogEntry);

  // ─── MPI Process Management ──────────────────────────────

  // Launch MPI ranks on this node (called by API server during fan-out).
  rpc LaunchProcesses(LaunchProcessesRequest) returns (LaunchProcessesResponse);

  // PMI fence: non-head nodes send local KVS to head node.
  rpc PmiFence(PmiFenceRequest) returns (PmiFenceResponse);

  // Abort all ranks for a launch (e.g., rank failure on another node).
  rpc AbortProcesses(AbortProcessesRequest) returns (AbortProcessesResponse);
}

// ─── RunAllocation ──────────────────────────────────────────

message RunAllocationRequest {
  string allocation_id = 1;
  string entrypoint = 2;
  // Environment configuration (uenv, OCI image, etc.)
  string uenv = 3;
  string image = 4;
  // Resource limits for this node's share
  uint32 gpu_count = 10;
  uint32 cpu_cores = 11;
  uint64 memory_bytes = 12;
}

message RunAllocationResponse {
  bool accepted = 1;
  string message = 2;
  // Typed refusal reason when accepted=false (DEC-DISP-05). Unknown values
  // (from a newer agent) MUST be treated as REFUSAL_MALFORMED_REQUEST
  // by the Dispatcher (safe-fail path per D-ADV-ARCH-10).
  optional RefusalReason refusal_reason = 3;
}

enum RefusalReason {
  REFUSAL_UNSPECIFIED = 0;
  // Agent temporarily saturated; Dispatcher should retry on the same node
  // within the current attempt budget with attempt_backoff.
  REFUSAL_BUSY = 1;
  // Agent refuses this allocation shape (missing GPU driver, incompatible
  // uenv, etc.). Dispatcher rolls back immediately to Pending so the
  // scheduler re-places on a capable node.
  REFUSAL_UNSUPPORTED_CAPABILITY = 2;
  // Allocation spec is malformed (invalid image, missing entrypoint, both
  // uenv and image set, forbidden env_var key). Dispatcher transitions
  // allocation directly to Failed; user must resubmit.
  REFUSAL_MALFORMED_REQUEST = 3;
  // Agent already has this allocation in its AllocationManager (INV-D3
  // idempotency). Dispatcher treats as success and waits for Completion
  // Reports on subsequent heartbeats.
  REFUSAL_ALREADY_RUNNING = 4;
}

// ─── StopAllocation ─────────────────────────────────────────

message StopAllocationRequest {
  string allocation_id = 1;
  // Grace period before SIGKILL (0 = immediate)
  uint32 grace_period_seconds = 2;
  string reason = 3;
}

message StopAllocationResponse {
  bool success = 1;
  string message = 2;
}
