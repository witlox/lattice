syntax = "proto3";

package lattice.v1;

option go_package = "github.com/lattice-scheduler/lattice/gen/go/lattice/v1";

import "google/protobuf/timestamp.proto";

// ─── Admin Service ──────────────────────────────────────────

service AdminService {
  // Create a new tenant
  rpc CreateTenant(CreateTenantRequest) returns (TenantResponse);

  // Update an existing tenant (quota, isolation level)
  rpc UpdateTenant(UpdateTenantRequest) returns (TenantResponse);

  // Create a new vCluster within a tenant
  rpc CreateVCluster(CreateVClusterRequest) returns (VClusterResponse);

  // Update vCluster settings (scheduler type, cost weights, borrowing)
  rpc UpdateVCluster(UpdateVClusterRequest) returns (VClusterResponse);

  // Get current Raft cluster status
  rpc GetRaftStatus(GetRaftStatusRequest) returns (RaftStatusResponse);

  // Verify backup integrity
  rpc BackupVerify(BackupVerifyRequest) returns (BackupVerifyResponse);

  // Create a backup of the current Raft state
  rpc CreateBackup(CreateBackupRequest) returns (CreateBackupResponse);

  // Restore from a backup (requires restart)
  rpc RestoreBackup(RestoreBackupRequest) returns (RestoreBackupResponse);

  // List all tenants
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);

  // Get a single tenant by ID
  rpc GetTenant(GetTenantRequest) returns (TenantResponse);

  // List all vClusters
  rpc ListVClusters(ListVClustersRequest) returns (ListVClustersResponse);

  // Get a single vCluster by ID
  rpc GetVCluster(GetVClusterRequest) returns (VClusterResponse);

  // Get queue info for a vCluster
  rpc GetVClusterQueue(GetVClusterQueueRequest) returns (VClusterQueueResponse);

  // Query audit log entries
  rpc QueryAudit(QueryAuditRequest) returns (QueryAuditResponse);

  // Get accounting usage
  rpc GetAccountingUsage(GetAccountingUsageRequest) returns (AccountingUsageResponse);

  // Service discovery: look up endpoints for a named service
  rpc LookupService(LookupServiceRequest) returns (LookupServiceResponse);

  // Service discovery: list all registered service names
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
}

// ─── Tenant Management ─────────────────────────────────────

message CreateTenantRequest {
  string name = 1;
  TenantQuotaSpec quota = 2;
  string isolation_level = 3;   // "standard" or "strict"
}

message UpdateTenantRequest {
  string tenant_id = 1;
  optional TenantQuotaSpec quota = 2;
  optional string isolation_level = 3;
}

message TenantQuotaSpec {
  uint32 max_nodes = 1;
  double fair_share_target = 2;
  optional double gpu_hours_budget = 3;
  optional uint32 max_concurrent_allocations = 4;
}

message TenantResponse {
  string tenant_id = 1;
  string name = 2;
  TenantQuotaSpec quota = 3;
  string isolation_level = 4;
}

// ─── VCluster Management ───────────────────────────────────

message CreateVClusterRequest {
  string tenant_id = 1;
  string name = 2;
  string scheduler_type = 3;    // "hpc_backfill", "service_bin_pack", "sensitive_reservation", "interactive_fifo"
  CostWeightsSpec cost_weights = 4;
  repeated string dedicated_nodes = 5;
  bool allow_borrowing = 6;
  bool allow_lending = 7;
}

message UpdateVClusterRequest {
  string vcluster_id = 1;
  optional CostWeightsSpec cost_weights = 2;
  optional bool allow_borrowing = 3;
  optional bool allow_lending = 4;
}

message CostWeightsSpec {
  double priority = 1;
  double wait_time = 2;
  double fair_share = 3;
  double topology = 4;
  double data_readiness = 5;
  double backlog = 6;
  double energy = 7;
  double checkpoint_efficiency = 8;
  double conformance = 9;
}

message VClusterResponse {
  string vcluster_id = 1;
  string tenant_id = 2;
  string name = 3;
  string scheduler_type = 4;
  CostWeightsSpec cost_weights = 5;
  bool allow_borrowing = 6;
  bool allow_lending = 7;
}

// ─── Raft Status ────────────────────────────────────────────

message GetRaftStatusRequest {}

message RaftStatusResponse {
  uint64 leader_id = 1;
  uint64 current_term = 2;
  uint64 last_applied = 3;
  uint64 commit_index = 4;
  repeated RaftMemberStatus members = 5;
}

message RaftMemberStatus {
  uint64 node_id = 1;
  string address = 2;
  string role = 3;              // "leader", "follower", "learner"
  uint64 match_index = 4;
  google.protobuf.Timestamp last_contact = 5;
}

// ─── Backup Verification ────────────────────────────────────

message BackupVerifyRequest {
  string backup_path = 1;      // S3 path or local path to backup
}

message BackupVerifyResponse {
  bool valid = 1;
  string message = 2;
  google.protobuf.Timestamp backup_timestamp = 3;
  uint64 snapshot_term = 4;
  uint64 snapshot_index = 5;
}

// ─── Backup Create ──────────────────────────────────────────

message CreateBackupRequest {
  string backup_path = 1;      // File path to write the backup to
}

message CreateBackupResponse {
  bool success = 1;
  string message = 2;
  google.protobuf.Timestamp backup_timestamp = 3;
  uint64 node_count = 4;
  uint64 allocation_count = 5;
  uint64 tenant_count = 6;
  uint64 audit_entry_count = 7;
}

// ─── Backup Restore ─────────────────────────────────────────

message RestoreBackupRequest {
  string backup_path = 1;      // File path of backup to restore from
}

message RestoreBackupResponse {
  bool success = 1;
  string message = 2;
}

// ─── Tenant Queries ─────────────────────────────────────────

message ListTenantsRequest {
  uint32 limit = 1;
  string cursor = 2;
}

message ListTenantsResponse {
  repeated TenantResponse tenants = 1;
  string next_cursor = 2;
}

message GetTenantRequest {
  string tenant_id = 1;
}

// ─── VCluster Queries ───────────────────────────────────────

message ListVClustersRequest {
  string tenant_id = 1;       // optional filter by tenant
  uint32 limit = 2;
  string cursor = 3;
}

message ListVClustersResponse {
  repeated VClusterResponse vclusters = 1;
  string next_cursor = 2;
}

message GetVClusterRequest {
  string vcluster_id = 1;
}

message GetVClusterQueueRequest {
  string vcluster_id = 1;
}

message VClusterQueueResponse {
  string vcluster_id = 1;
  uint32 pending = 2;
  uint32 running = 3;
  uint32 total = 4;
}

// ─── Audit Queries ──────────────────────────────────────────

message QueryAuditRequest {
  string tenant_id = 1;
  string user_id = 2;
  string action = 3;
  uint32 limit = 4;
  string cursor = 5;
}

message QueryAuditResponse {
  repeated AuditEntryProto entries = 1;
  string next_cursor = 2;
}

message AuditEntryProto {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string action = 4;
  string details = 5;
  google.protobuf.Timestamp timestamp = 6;
}

// ─── Accounting ─────────────────────────────────────────────

message GetAccountingUsageRequest {
  string tenant_id = 1;
  google.protobuf.Timestamp start = 2;
  google.protobuf.Timestamp end = 3;
}

message AccountingUsageResponse {
  string tenant_id = 1;
  double cpu_hours = 2;
  double gpu_hours = 3;
  uint64 storage_bytes = 4;
  uint32 allocation_count = 5;
}

// ─── Service Discovery ─────────────────────────────────────

message LookupServiceRequest {
  string name = 1;
}

message LookupServiceResponse {
  string name = 1;
  repeated RegisteredEndpointProto endpoints = 2;
}

message RegisteredEndpointProto {
  string allocation_id = 1;
  string tenant = 2;
  repeated string nodes = 3;
  uint32 port = 4;
  string protocol = 5;
}

message ListServicesRequest {
}

message ListServicesResponse {
  repeated string names = 1;
}
