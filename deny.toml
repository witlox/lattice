[graph]
targets = []

[advisories]
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # tokio-tar via testcontainers (dev-only dependency, not in production builds)
    "RUSTSEC-2025-0111",
]

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "OpenSSL",
    "BlueOak-1.0.0",
    "CDLA-Permissive-2.0",
    # CC0-1.0 (public-domain-equivalent) — pulled in transitively via
    # tiny-keccak → const-random → dlv-list → ordered-multimap →
    # rust-ini → config. FSF-approved as Free/Libre.
    "CC0-1.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
